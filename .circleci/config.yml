# DO NOT MODIFY - this is managed by Git Reduce in goro and generated from build-matrix.json
#
---
version: 2.1

############
## Github Actions Pipeline Params
############

parameters:
  GHA_Event:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

orbs:
  stitchfix_build: stitchfix/build@dev:master

jobs:
  generate-and-push-docs:
    docker:
    - image: cimg/ruby:4.0.6
      auth:
        username: "$DOCKERHUB_USERNAME"
        password: "$DOCKERHUB_PASSWORD"
    steps:
    - checkout
    - run: bundle config set stitchfix01.jfrog.io $ARTIFACTORY_USER:$ARTIFACTORY_TOKEN
    - run: bundle install
    - run:
        name: Generate documentation
        command: ' if [[ $(bundle exec rake -T docs:generate:custom) ]]; then echo
          "Generating docs using rake task docs:generate:custom" ; bundle exec rake
          docs:generate:custom ; elif [[ $(bundle exec rake -T docs:generate) ]];
          then echo "Generating docs using rake task docs:generate" ; bundle exec
          rake docs:generate ; else echo "Skipping doc generation" ; exit 0 ; fi '
    - stitchfix_build/aws_cli_setup_eng
    - run:
        name: Push documentation to Unwritten
        command: if [[ $(bundle exec rake -T docs:push) ]]; then bundle exec rake
          docs:push; fi
  release:
    docker:
    - image: cimg/ruby:4.0.6
      auth:
        username: "$DOCKERHUB_USERNAME"
        password: "$DOCKERHUB_PASSWORD"
    steps:
    - checkout
    - run: bundle config set stitchfix01.jfrog.io $ARTIFACTORY_USER:$ARTIFACTORY_TOKEN
    - run: bundle install
    - run:
        name: Artifactory login
        command: mkdir -p ~/.gem && curl -u$ARTIFACTORY_USER:$ARTIFACTORY_TOKEN https://stitchfix01.jfrog.io/stitchfix01/api/gems/eng-gems/api/v1/api_key.yaml
          > ~/.gem/credentials && chmod 0600 ~/.gem/credentials
    - run:
        name: Build/release gem to artifactory
        command: bundle exec rake push_artifactory
  ruby-4_0_6:
    docker:
    - image: cimg/ruby:4.0.6
      auth:
        username: "$DOCKERHUB_USERNAME"
        password: "$DOCKERHUB_PASSWORD"
    working_directory: "~/merch_calendar"
    steps:
    - checkout
    - run:
        name: Check for Gemfile.lock presence
        command: ' if (test -f Gemfile.lock) then echo "Dont commit Gemfile.lock (see
          https://github.com/stitchfix/eng-wiki/blob/main/architecture-decisions/0009-rubygem-dependencies-will-be-managed-more-explicitly.md)"
          1>&2 ; exit 1 ; else exit 0 ; fi '
    - run: bundle config set stitchfix01.jfrog.io $ARTIFACTORY_USER:$ARTIFACTORY_TOKEN
    - run: bundle install
    - run: bundle exec rspec --format RspecJunitFormatter --out /tmp/test-results/rspec.xml
        --format=doc
    - run:
        name: Run Additional CI Steps
        command: if [ -e bin/additional-ci-steps ]; then bin/additional-ci-steps;
          fi
    - run:
        name: Notify Pager Duty
        command: bundle exec y-notify "#buying-platform-info"
        when: on_fail
    - store_test_results:
        path: "/tmp/test-results"
  ruby-3_4_10:
    docker:
    - image: cimg/ruby:3.4.10
      auth:
        username: "$DOCKERHUB_USERNAME"
        password: "$DOCKERHUB_PASSWORD"
    working_directory: "~/merch_calendar"
    steps:
    - checkout
    - run:
        name: Check for Gemfile.lock presence
        command: ' if (test -f Gemfile.lock) then echo "Dont commit Gemfile.lock (see
          https://github.com/stitchfix/eng-wiki/blob/main/architecture-decisions/0009-rubygem-dependencies-will-be-managed-more-explicitly.md)"
          1>&2 ; exit 1 ; else exit 0 ; fi '
    - run: bundle config set stitchfix01.jfrog.io $ARTIFACTORY_USER:$ARTIFACTORY_TOKEN
    - run: bundle install
    - run: bundle exec rspec --format RspecJunitFormatter --out /tmp/test-results/rspec.xml
        --format=doc
    - run:
        name: Run Additional CI Steps
        command: if [ -e bin/additional-ci-steps ]; then bin/additional-ci-steps;
          fi
    - run:
        name: Notify Pager Duty
        command: bundle exec y-notify "#buying-platform-info"
        when: on_fail
    - store_test_results:
        path: "/tmp/test-results"
workflows:
  version: 2
  on-commit:
    unless:
       equal: [ "schedule", << pipeline.parameters.GHA_Event >> ]
    jobs:
    - release:
        context: org-global
        requires:
        - ruby-4_0_6
        - ruby-3_4_10
        filters:
          tags:
            only: "/^[0-9]+\\.[0-9]+\\.[0-9]+([-.].+)?$/"
          branches:
            ignore: /.*/
    - generate-and-push-docs:
        context: org-global
        requires:
        - release
        filters:
          tags:
            only: "/^[0-9]+\\.[0-9]+\\.[0-9]+([-.].+)?$/"
          branches:
            ignore: /.*/
    - ruby-4_0_6:
        context: org-global
        filters:
          tags:
            only: &1 /.*/
    - ruby-3_4_10:
        context: org-global
        filters:
          tags:
            only: *1
  scheduled:
    when:
       equal: [ "schedule", << pipeline.parameters.GHA_Event >> ]
    jobs:
    - ruby-4_0_6:
        context: org-global
    - ruby-3_4_10:
        context: org-global
